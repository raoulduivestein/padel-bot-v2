<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<div class="d-flex justify-content-between mb-4">
  <h2>Padel Bot Dashboard</h2>
  <a href="/logout" class="btn btn-outline-danger">Logout</a>
</div>

<div class="row">

<!-- CONFIG EDIT -->
<div class="col-md-6">
  <div class="card shadow-sm">
    <div class="card-header">Config aanpassen</div>

    <div class="card-body">
      <form method="POST" action="/update_config">

        <label>Days Ahead</label>
        <input name="days_ahead" class="form-control mb-3" value="{{ config.days_ahead }}">

        <label>Prep Time</label>
        <input name="prep" class="form-control mb-3" value="{{ config.run_time.prep }}">

        <label>Booking Time</label>
        <input name="booking" class="form-control mb-3" value="{{ config.run_time.booking }}">

        <hr>

        <h5>Booking Rules</h5>

        {% for rule in config.booking_rules %}
        <div class="mb-3">

          <strong>{{ rule.day }}</strong>

          <input
            name="times_{{ loop.index0 }}"
            class="form-control mt-1"
            value="{{ rule.times | join(',') }}"
            placeholder="18:00,19:00"
          >

          <input
            name="duration_{{ loop.index0 }}"
            class="form-control mt-1"
            value="{{ rule.duration }}"
            placeholder="duration"
          >

        </div>
        {% endfor %}

        <button class="btn btn-dark w-100">Opslaan</button>

      </form>
    </div>
  </div>
</div>

<!-- LOGS -->
<div class="col-md-6">
  <div class="card shadow-sm">
    <div class="card-header">Runs</div>

    <ul class="list-group list-group-flush">
      {% for log in logs %}
      <li class="list-group-item d-flex justify-content-between">
        {{ log }}
        <a href="/log/{{ log }}" class="btn btn-sm btn-dark">View</a>
      </li>
      {% endfor %}
    </ul>

  </div>
</div>

</div>

</div>

</body>
</html>
