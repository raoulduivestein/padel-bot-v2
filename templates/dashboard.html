<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f5f7fa, #e4ecf3);
}
.card {
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
.fc { font-size: 12px; }
.player-link { cursor:pointer; padding:6px; border-radius:8px; }
.player-link:hover { background:#eef; }
</style>
</head>

<body>
<div class="container-fluid p-3">

<div class="d-flex justify-content-between mb-3">
  <h5>🎾 Padel Bot</h5>
  <div>
    <a href="/run_now" class="btn btn-success btn-sm">🚀 Run</a>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
  </div>
</div>

<div class="row g-3">

<!-- CONFIG -->
<div class="col-lg-4">
<div class="card p-3">
<form method="POST" action="/update_config">
<input name="days_ahead" class="form-control mb-2" value="{{ config.days_ahead }}">
<input type="time" name="prep" class="form-control mb-2" value="{{ config.run_time.prep }}">
<input type="time" name="booking" class="form-control mb-2" value="{{ config.run_time.booking }}">
<button class="btn btn-dark w-100">💾 Opslaan</button>
</form>
</div>
</div>

<!-- STATS -->
<div class="col-lg-4">
<div class="card p-3">
<canvas id="chart"></canvas>
<div id="statusList"></div>
</div>
</div>

<!-- LOGS -->
<div class="col-lg-4">
<div class="card p-3">
<select id="logSelect" class="form-select mb-2"></select>
<div id="liveLog" style="height:300px; overflow:auto; background:black; color:#22c55e;"></div>
</div>
</div>

<!-- CALENDAR -->
<div class="col-12">
<div class="card p-3">

<div class="d-flex justify-content-between mb-2">
<h6>📅 Kalender</h6>
<button onclick="fetchBookings()" class="btn btn-primary btn-sm">📥 Sync</button>
</div>

<div id="calendar"></div>

</div>
</div>

</div>
</div>

<!-- BOOKING MODAL -->
<div class="modal fade" id="bookingModal">
<div class="modal-dialog">
<div class="modal-content p-3">

<div class="d-flex justify-content-between">
<h6 id="bookingTitle"></h6>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div id="bookingPlayers"></div>
<div id="inviteSection"></div>

</div>
</div>
</div>

<!-- PLAYER MODAL -->
<div class="modal fade" id="playerModal">
<div class="modal-dialog">
<div class="modal-content p-3">

<div class="d-flex justify-content-between">
<h6 id="playerName"></h6>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<input id="playerPhone" class="form-control mb-2">

<div id="playerRating"></div>
<div id="playerPunctuality"></div>

<button onclick="savePlayer()" class="btn btn-dark mt-2">💾 Opslaan</button>

</div>
</div>
</div>

<!-- TOAST -->
<div id="toastContainer" class="position-fixed bottom-0 end-0 p-3"></div>

<script>
let chart
let calendar
let currentBooking=null
let currentPlayerId=null

// 🔥 COURT MAPPING
const COURT_MAP = {
  737381: "Court 1",
  737383: "Court 2",
  737385: "Court 3"
}

// -------- TOAST --------
function showToast(msg,type="success"){
  const toast=document.createElement("div")
  toast.className=`toast show text-white bg-${type==="success"?"success":type==="error"?"danger":"warning"} mb-2`
  toast.innerHTML=`<div class="toast-body">${msg}</div>`
  document.getElementById("toastContainer").appendChild(toast)
  setTimeout(()=>toast.remove(),4000)
}

// -------- STATUS --------
async function loadStatus(){
  try{
    const res=await fetch("/api/status")
    const data=await res.json()

    let s=0,f=0,r=0
    let html="",dropdown=""

    data.forEach(x=>{
      if(x.status==="success") s++
      if(x.status==="failed") f++
      if(x.status==="running") r++

      html+=`<div>${x.file} (${x.status})</div>`
      dropdown+=`<option value="${x.file}">${x.file}</option>`
    })

    document.getElementById("statusList").innerHTML=html
    document.getElementById("logSelect").innerHTML=dropdown

    updateChart(s,f,r)

  }catch(e){
    console.error(e)
  }
}

function updateChart(s,f,r){
  if(!chart){
    chart=new Chart(document.getElementById("chart"),{
      type:"doughnut",
      data:{
        labels:["Success","Failed","Running"],
        datasets:[{
          data:[s,f,r],
          backgroundColor:["#28a745","#dc3545","#ffc107"]
        }]
      }
    })
  }else{
    chart.data.datasets[0].data=[s,f,r]
    chart.update()
  }
}

// -------- LOG --------
async function loadLog(){
  const file=document.getElementById("logSelect").value
  if(!file) return

  try{
    const res=await fetch(`/api/log/${file}`)
    const data=await res.json()

    document.getElementById("liveLog").innerHTML=
      data.lines.map(l=>`<div>${l}</div>`).join("")
  }catch(e){
    console.error(e)
  }
}

// -------- DATE --------
function formatISO(str){
  const [d,m,yTime]=str.split("-")
  const [y,time]=yTime.split(" ")
  return `${y}-${m}-${d}T${time}`
}

function formatDutch(str){
  const [d,m,yTime]=str.split("-")
  const [y,time]=yTime.split(" ")
  return `${d}-${m} ${time}`
}

// -------- CALENDAR --------
async function initCalendar(){

  const res=await fetch("/api/bookings")
  const bookings=await res.json()

  const events=bookings.map(b=>({

    title:`${COURT_MAP[b.court_id] || b.court} (${b.duration}m)`,
    start:formatISO(b.datetime),
    color:b.status==="confirmed"?"#28a745":"#ffc107",
    extendedProps:b
  }))

  if(calendar){
    calendar.removeAllEvents()
    calendar.addEventSource(events)
    return
  }

  calendar=new FullCalendar.Calendar(document.getElementById("calendar"),{
    initialView:"dayGridMonth",
    firstDay:1,
    locale:"nl",
    height:"auto",
    events,
    eventClick:(info)=>openBookingModal(info.event.extendedProps)
  })

  calendar.render()
}

// -------- FETCH --------
async function fetchBookings(){
  showToast("📥 Sync...", "warning")
  await fetch("/api/fetch_bookings")
  showToast("✅ Klaar")
  initCalendar()
}

// -------- MODAL --------
async function openBookingModal(b){

  currentBooking=b

  document.getElementById("bookingTitle").innerText =
    `${formatDutch(b.datetime)} (${b.duration} min)`

  let html=""
  b.players.forEach(p=>{
    html+=`<div class="player-link" onclick="openPlayerModal('${p.id}')">🎾 ${p.name}</div>`
  })

  document.getElementById("bookingPlayers").innerHTML=html

  if(b.players.length<4){

    const res=await fetch("/api/players_list")
    const players=await res.json()

    const existing=b.players.map(p=>p.id)
    const available=players.filter(p=>!existing.includes(p.id))

    let options=available.map(p=>
      `<option value="${p.id}" data-phone="${p.phone}">${p.name}</option>`
    ).join("")

    document.getElementById("inviteSection").innerHTML=`
      <hr>
      <select id="invitePlayer" class="form-select mb-2">${options}</select>

      <div class="d-flex gap-2">
        <button onclick="sendInvite()" class="btn btn-outline-success w-50">📲 WhatsApp</button>
        <button onclick="addPlayerToBooking()" class="btn btn-success w-50">➕ Add</button>
      </div>
    `
  } else {
    document.getElementById("inviteSection").innerHTML=""
  }

  new bootstrap.Modal(document.getElementById("bookingModal")).show()
}

// -------- WHATSAPP --------
function sendInvite(){

  const sel=document.getElementById("invitePlayer")
  const phone=sel.selectedOptions[0].dataset.phone

  const spelers=currentBooking.players.map(p=>"- "+p.name).join("\n")

  const msg=`Padel

${formatDutch(currentBooking.datetime)}
${currentBooking.court}
Duur: ${currentBooking.duration} min

Spelers:
${spelers}

Laat even weten of je kan.`

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`)
}

// -------- ADD PLAYER --------
async function addPlayerToBooking(){

  const sel=document.getElementById("invitePlayer")
  const playerId=sel.value
  const current=currentBooking.players.map(p=>p.id)

  await fetch("/api/add_player_to_booking",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      booking_ref: currentBooking.encodedBookingReference,
      player_id: playerId,
      current_players: current
    })
  })

  showToast("✅ Speler toegevoegd")
  fetchBookings()
}

// -------- PLAYER --------
async function openPlayerModal(id){
  currentPlayerId=id

  const res=await fetch("/api/players")
  const players=await res.json()
  const p=players[id]

  document.getElementById("playerName").innerText=p.name
  document.getElementById("playerPhone").value=p.phone||""

  renderRating(p.rating||3)
  renderPunctuality(p.punctuality||3)

  new bootstrap.Modal(document.getElementById("playerModal")).show()
}

function savePlayer(){
  fetch("/api/update_player",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id:currentPlayerId,
      phone:document.getElementById("playerPhone").value,
      rating:window.rating,
      punctuality:window.punctuality
    })
  })

  showToast("💾 Speler opgeslagen")
  bootstrap.Modal.getInstance(document.getElementById("playerModal")).hide()
}

function renderRating(v){
  window.rating=v
  let html=""
  for(let i=1;i<=5;i++){
    html+=`<span onclick="renderRating(${i})">${i<=v?"🎾":"⚪"}</span>`
  }
  document.getElementById("playerRating").innerHTML=html
}

function renderPunctuality(v){
  window.punctuality=v
  let html=""
  for(let i=1;i<=5;i++){
    html+=`<span onclick="renderPunctuality(${i})">${i<=v?"⏰":"⚪"}</span>`
  }
  document.getElementById("playerPunctuality").innerHTML=html
}

// -------- INIT --------
setInterval(()=>{
  loadStatus()
  loadLog()
},2000)

loadStatus()
initCalendar()
</script>

</body>
</html>
