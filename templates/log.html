<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="chart"></canvas>

<div id="statusList"></div>

<select id="logSelect">
  {% for log in logs %}
  <option value="{{ log }}">{{ log }}</option>
  {% endfor %}
</select>

<div id="liveLog"></div>

<script>
let chart

async function loadStatus() {
  const res = await fetch("/api/status")
  const data = await res.json()

  let success = 0, failed = 0

  data.forEach(r => {
    if (r.status === "success") success++
    if (r.status === "failed") failed++
  })

  if (!chart) {
    chart = new Chart(document.getElementById('chart'), {
      type: 'doughnut',
      data: {
        labels: ['Success','Failed'],
        datasets: [{data:[success,failed]}]
      }
    })
  } else {
    chart.data.datasets[0].data = [success, failed]
    chart.update()
  }
}

async function loadLog() {
  const file = document.getElementById("logSelect").value
  const res = await fetch(`/api/log/${file}`)
  const data = await res.json()

  document.getElementById("liveLog").innerHTML =
    data.lines.map(l => `<div>${l}</div>`).join("")
}

setInterval(loadStatus, 2000)
setInterval(loadLog, 2000)
</script>
