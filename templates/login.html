<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f5f7fa, #e4ecf3);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  width: 100%;
  max-width: 400px;
  padding: 24px;
  border-radius: 16px;
  background: white;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
}

.form-control {
  border-radius: 10px;
  padding: 10px;
}

.btn-login {
  border-radius: 10px;
  background: linear-gradient(135deg, #28a745, #3ddc84);
  border: none;
  font-weight: 500;
}

.btn-login:hover {
  transform: translateY(-1px);
}

.logo {
  font-size: 22px;
  font-weight: 600;
}

.subtitle {
  font-size: 13px;
  color: #666;
}
</style>

</head>

<body>

<div class="login-card">

  <div class="text-center mb-4">
    <div class="logo">🎾 Padel Bot</div>
    <div class="subtitle">Login om verder te gaan</div>
  </div>

  <form method="POST">

    <div class="mb-3">
      <label class="form-label">Gebruikersnaam</label>
      <input name="username" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Wachtwoord</label>
      <input type="password" name="password" class="form-control" required>
    </div>

    <button class="btn btn-login w-100">Inloggen</button>

  </form>

</div>

</body>
</html>
