<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container-fluid p-3">

<div class="d-flex justify-content-between mb-3">
  <h5>🎾 Padel Bot</h5>
  <div>
    <a href="/run_now" class="btn btn-success btn-sm">🚀 Run Now</a>
    <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
  </div>
</div>

<div class="row g-3">

<!-- CONFIG -->
<div class="col-12 col-lg-4">
  <div class="card shadow-sm">
    <div class="card-header">⚙️ Config</div>
    <div class="card-body">

      <form method="POST" action="/update_config">

        <input name="days_ahead" class="form-control mb-2" value="{{ config.days_ahead }}">
        <input name="prep" class="form-control mb-2" value="{{ config.run_time.prep }}">
        <input name="booking" class="form-control mb-3" value="{{ config.run_time.booking }}">

        <hr>

        {% for rule in config.booking_rules %}
        <div class="mb-2">
          <strong>{{ rule.day }}</strong>

          <input name="times_{{ loop.index0 }}"
                 class="form-control mb-1"
                 value="{{ rule.times | join(',') }}">

          <input name="duration_{{ loop.index0 }}"
                 class="form-control"
                 value="{{ rule.duration }}">
        </div>
        {% endfor %}

        <button class="btn btn-dark w-100">💾 Opslaan</button>

      </form>

    </div>
  </div>
</div>

<!-- STATUS -->
<div class="col-12 col-lg-4">
  <div class="card shadow-sm">
    <div class="card-header">📊 Status</div>
    <div class="card-body">

      <canvas id="chart"></canvas>

      <div id="statusList" class="mt-3 small"></div>

    </div>
  </div>
</div>

<!-- LIVE LOG -->
<div class="col-12 col-lg-4">
  <div class="card shadow-sm">
    <div class="card-header">🔄 Live Logs</div>
    <div class="card-body">

      <select id="logSelect" class="form-select mb-2"></select>

      <div id="liveLog"
           class="bg-black text-success p-2 rounded small"
           style="height:300px; overflow:auto;">
      </div>

    </div>
  </div>
</div>

</div>

</div>

<!-- TOAST -->
<div id="toastContainer" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

<script>
let chart
let currentSelected = null
let lastStatus = {}

function showToast(message, type="info") {
  const colors = {
    success: "bg-success",
    failed: "bg-danger",
    running: "bg-warning text-dark"
  }

  const toast = document.createElement("div")
  toast.className = `toast ${colors[type]} text-white p-2 mb-2`
  toast.innerHTML = message

  document.getElementById("toastContainer").appendChild(toast)
  setTimeout(() => toast.remove(), 4000)
}

async function loadStatus() {
  const res = await fetch("/api/status")
  const data = await res.json()

  let success = 0
  let failed = 0
  let running = 0

  let html = ""
  let dropdown = ""

  data.forEach(r => {

    if (r.status === "success") success++
    if (r.status === "failed") failed++
    if (r.status === "running") running++

    // popup detectie
    if (lastStatus[r.file] && lastStatus[r.file] !== r.status) {
      if (r.status === "success") showToast(`✅ ${r.file} gelukt`, "success")
      if (r.status === "failed") showToast(`❌ ${r.file} gefaald`, "failed")
    }

    if (!lastStatus[r.file] && r.status === "running") {
      showToast(`🚀 Run gestart`, "running")
    }

    lastStatus[r.file] = r.status

    const color =
      r.status === "success" ? "green" :
      r.status === "failed" ? "red" :
      "orange"

    html += `
      <div onclick="openLog('${r.file}')" style="cursor:pointer">
        ${r.file}
        <span style="color:${color}">
          ● ${r.status}
        </span>
      </div>
    `

    dropdown += `
      <option value="${r.file}">
        ${r.file} (${r.status})
      </option>
    `
  })

  document.getElementById("statusList").innerHTML = html

  const select = document.getElementById("logSelect")
  const prev = select.value

  select.innerHTML = dropdown

  if (data.length > 0) {
    const newest = data[0].file

    if (!prev || currentSelected !== newest) {
      select.value = newest
      currentSelected = newest
    }
  }

  updateChart(success, failed, running)
}

function openLog(file) {
  window.location.href = "/log/" + file
}

function updateChart(success, failed, running) {
  const total = success + failed + running

  const dataValues = [success, failed, running]

  const labels = [
    `Success (${percentage(success, total)}%)`,
    `Failed (${percentage(failed, total)}%)`,
    `Running (${percentage(running, total)}%)`
  ]

  const colors = [
    "#28a745", // groen
    "#dc3545", // rood
    "#ffc107"  // geel
  ]

  if (!chart) {
    chart = new Chart(document.getElementById('chart'), {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: dataValues,
          backgroundColor: colors
        }]
      }
    })
  } else {
    chart.data.labels = labels
    chart.data.datasets[0].data = dataValues
    chart.update()
  }
}

function percentage(value, total) {
  if (total === 0) return 0
  return Math.round((value / total) * 100)
}

async function loadLog() {
  const file = document.getElementById("logSelect").value
  if (!file) return

  const res = await fetch(`/api/log/${file}`)
  const data = await res.json()

  const el = document.getElementById("liveLog")

  el.innerHTML = data.lines.map(l => `<div>${l}</div>`).join("")
  el.scrollTop = el.scrollHeight
}

setInterval(() => {
  loadStatus()
  loadLog()
}, 2000)

loadStatus()
setTimeout(loadLog, 500)
</script>

</body>
</html>
