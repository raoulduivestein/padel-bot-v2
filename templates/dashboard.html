<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container-fluid p-3">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0">Padel Bot</h5>
  <a href="/logout" class="btn btn-sm btn-outline-danger">Logout</a>
</div>

<div class="row g-3">

<!-- CONFIG -->
<div class="col-12 col-lg-6">
  <div class="card shadow-sm">
    <div class="card-header">⚙️ Config</div>

    <div class="card-body">

      <form method="POST" action="/update_config">

        <label class="form-label">Days Ahead</label>
        <input name="days_ahead" class="form-control mb-3" value="{{ config.days_ahead }}">

        <div class="row">
          <div class="col-6">
            <label class="form-label">Prep</label>
            <input name="prep" class="form-control mb-3" value="{{ config.run_time.prep }}">
          </div>

          <div class="col-6">
            <label class="form-label">Booking</label>
            <input name="booking" class="form-control mb-3" value="{{ config.run_time.booking }}">
          </div>
        </div>

        <hr>

        <h6>📅 Booking Rules</h6>

        {% for rule in config.booking_rules %}
        <div class="border rounded p-2 mb-2">

          <strong>{{ rule.day }}</strong>

          <input
            name="times_{{ loop.index0 }}"
            class="form-control mt-1"
            value="{{ rule.times | join(',') }}"
          >

          <input
            name="duration_{{ loop.index0 }}"
            class="form-control mt-1"
            value="{{ rule.duration }}"
          >

        </div>
        {% endfor %}

        <button class="btn btn-dark w-100 mt-2">💾 Opslaan</button>

      </form>

    </div>
  </div>
</div>

<!-- LOGS -->
<div class="col-12 col-lg-6">
  <div class="card shadow-sm">
    <div class="card-header">📄 Runs</div>

    <div class="list-group list-group-flush">

      {% for log in logs %}
      <a href="/log/{{ log }}" class="list-group-item list-group-item-action d-flex justify-content-between">
        <span>{{ log }}</span>
        <span>➡️</span>
      </a>
      {% endfor %}

    </div>

  </div>
</div>

</div>

</div>

</body>
</html>
