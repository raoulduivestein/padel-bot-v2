<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container-fluid p-3">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0">🎾 Padel Bot</h5>
  <div>
    <a href="/run_now" class="btn btn-success btn-sm">🚀 Run Now</a>
    <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
  </div>
</div>

<div class="row g-3">

<!-- CONFIG -->
<div class="col-12 col-lg-4">
  <div class="card shadow-sm">
    <div class="card-header">⚙️ Config</div>
    <div class="card-body">

      <form method="POST" action="/update_config">

        <label class="form-label">Days Ahead</label>
        <input name="days_ahead" class="form-control mb-2" value="{{ config.days_ahead }}">

        <label class="form-label">Prep</label>
        <input name="prep" class="form-control mb-2" value="{{ config.run_time.prep }}">

        <label class="form-label">Booking</label>
        <input name="booking" class="form-control mb-3" value="{{ config.run_time.booking }}">

        <button class="btn btn-dark w-100">💾 Opslaan</button>

      </form>

    </div>
  </div>
</div>

<!-- STATUS + CHART -->
<div class="col-12 col-lg-4">
  <div class="card shadow-sm">
    <div class="card-header">📊 Status</div>
    <div class="card-body">

      <canvas id="chart"></canvas>

      <div id="statusList" class="mt-3 small"></div>

    </div>
  </div>
</div>

<!-- LIVE LOG -->
<div class="col-12 col-lg-4">
  <div class="card shadow-sm">
    <div class="card-header">🔄 Live Logs</div>
    <div class="card-body">

      <select id="logSelect" class="form-select mb-2">
        {% for log in logs %}
        <option value="{{ log }}">{{ log }}</option>
        {% endfor %}
      </select>

      <div id="liveLog"
           class="bg-black text-success p-2 rounded small"
           style="height:300px; overflow:auto;">
      </div>

    </div>
  </div>
</div>

</div>

</div>

<script>
let chart

async function loadStatus() {
  const res = await fetch("/api/status")
  const data = await res.json()

  let success = 0
  let failed = 0

  let html = ""

  data.forEach(r => {
    if (r.status === "success") success++
    if (r.status === "failed") failed++

    html += `
      <div>
        ${r.file}
        <span style="color:${r.status === 'success' ? 'green' : 'red'}">
          ● ${r.status}
        </span>
      </div>
    `
  })

  document.getElementById("statusList").innerHTML = html

  if (!chart) {
    chart = new Chart(document.getElementById('chart'), {
      type: 'doughnut',
      data: {
        labels: ['Success','Failed'],
        datasets: [{ data:[success,failed] }]
      }
    })
  } else {
    chart.data.datasets[0].data = [success, failed]
    chart.update()
  }
}


async function loadLog() {
  const file = document.getElementById("logSelect").value
  const res = await fetch(`/api/log/${file}`)
  const data = await res.json()

  document.getElementById("liveLog").innerHTML =
    data.lines.map(l => `<div>${l}</div>`).join("")
}


setInterval(loadStatus, 2000)
setInterval(loadLog, 2000)

loadStatus()
loadLog()
</script>

</body>
</html>
