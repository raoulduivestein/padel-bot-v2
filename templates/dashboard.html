<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f5f7fa, #e4ecf3);
}

.card {
  border-radius: 16px;
  border: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.form-control {
  border-radius: 10px;
}

.day-card {
  background: #f9fafb;
  border-radius: 12px;
  padding: 10px;
}

.day-header {
  cursor: pointer;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
}

.toast-modern {
  border-radius: 12px;
  padding: 12px;
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: slideIn 0.3s ease;
}

.toast-success { background: #28a745; }
.toast-error   { background: #dc3545; }
.toast-running { background: #ffc107; color:black; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity:0 }
  to   { transform: translateX(0); opacity:1 }
}
</style>

</head>

<body>

<div class="container-fluid p-3">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h5 class="mb-0">🎾 Padel Bot</h5>
    <small class="text-muted">Dashboard</small>
  </div>

  <div class="d-flex gap-2">
    <a href="/run_now" class="btn btn-success btn-sm">🚀 Run</a>
    <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
  </div>
</div>

<div class="row g-3">

<!-- CONFIG -->
<div class="col-12 col-lg-4">
  <div class="card p-3">
    
    <h6 class="mb-3">⚙️ Config</h6>

    <form method="POST" action="/update_config">

      <label class="form-label">Days Ahead</label>
      <input name="days_ahead" class="form-control mb-2" value="{{ config.days_ahead }}">

      <label class="form-label">Prep Time</label>
      <input type="time" name="prep" class="form-control mb-2" value="{{ config.run_time.prep }}">

      <label class="form-label">Booking Time</label>
      <input type="time" name="booking" class="form-control mb-3" value="{{ config.run_time.booking }}">

      <hr>

      <h6 class="mb-2">📅 Speelmomenten</h6>

      {% set order = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'] %}

      {% for day in order %}
        {% for rule in config.booking_rules if rule.day == day %}

        <div class="day-card mb-2">

          <div class="day-header" onclick="toggleDay('{{ loop.index0 }}')">
            <span class="text-capitalize">{{ rule.day }}</span>
            <span id="icon-{{ loop.index0 }}">▼</span>
          </div>

          <div id="day-{{ loop.index0 }}" class="mt-2">

            <div class="row g-2">

              <!-- TIME -->
              <div class="col-6">
                <label class="small">Start tijd</label>
                <input type="time"
                       name="times_{{ loop.index0 }}"
                       class="form-control"
                       value="{{ rule.times[0] }}">
              </div>

              <!-- DURATION -->
              <div class="col-6">
                <label class="small">Duur (uur)</label>
                <input type="number"
                       name="duration_{{ loop.index0 }}"
                       class="form-control"
                       value="{{ rule.duration }}">
              </div>

            </div>

          </div>

        </div>

        {% endfor %}
      {% endfor %}

      <button class="btn btn-dark w-100 mt-2">💾 Opslaan</button>

    </form>

  </div>
</div>

<!-- STATS -->
<div class="col-12 col-lg-4">
  <div class="card p-3">
    <h6 class="mb-3">📊 Statistieken</h6>
    <canvas id="chart"></canvas>
    <div id="statusList" class="mt-3 small"></div>
  </div>
</div>

<!-- LOGS -->
<div class="col-12 col-lg-4">
  <div class="card p-3">
    <h6 class="mb-3">📄 Logs</h6>
    <select id="logSelect" class="form-select mb-2"></select>
    <div id="liveLog" class="bg-black text-success p-2 rounded small" style="height:300px; overflow:auto;"></div>
  </div>
</div>

</div>

</div>

<div id="toastContainer" class="position-fixed bottom-0 end-0 p-3"></div>

<script>
function toggleDay(i) {
  const el = document.getElementById("day-"+i)
  const icon = document.getElementById("icon-"+i)

  if (el.style.display === "none") {
    el.style.display = "block"
    icon.innerText = "▼"
  } else {
    el.style.display = "none"
    icon.innerText = "▶"
  }
}
</script>

</body>
</html>
