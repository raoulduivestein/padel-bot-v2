<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f5f7fa, #e4ecf3);
}

.card {
  border-radius: 16px;
  border: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.form-control {
  border-radius: 10px;
}

.toast-modern {
  border-radius: 12px;
  padding: 12px;
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: slideIn 0.3s ease;
}

.toast-success { background: #28a745; }
.toast-error   { background: #dc3545; }
.toast-running { background: #ffc107; color:black; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity:0 }
  to   { transform: translateX(0); opacity:1 }
}
</style>

</head>

<body>

<div class="container-fluid p-3">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h5 class="mb-0">🎾 Padel Bot</h5>
    <small class="text-muted">Dashboard</small>
  </div>

  <div class="d-flex gap-2">
    <a href="/run_now" class="btn btn-success btn-sm">🚀 Run</a>
    <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
  </div>
</div>

<div class="row g-3">

<!-- CONFIG -->
<div class="col-12 col-lg-4">
  <div class="card p-3">
    
    <h6 class="mb-3">⚙️ Config</h6>

    <form method="POST" action="/update_config">

      <div class="row g-2 mb-3">
        <div class="col-4">
          <label class="small">Days</label>
          <input name="days_ahead" class="form-control" value="{{ config.days_ahead }}">
        </div>

        <div class="col-4">
          <label class="small">Prep</label>
          <input type="time" name="prep" class="form-control" value="{{ config.run_time.prep }}">
        </div>

        <div class="col-4">
          <label class="small">Book</label>
          <input type="time" name="booking" class="form-control" value="{{ config.run_time.booking }}">
        </div>
      </div>

      <button class="btn btn-dark w-100 mt-2">💾 Opslaan</button>

    </form>

  </div>
</div>

<!-- STATS -->
<div class="col-12 col-lg-4">
  <div class="card p-3">
    <h6 class="mb-3">📊 Statistieken</h6>
    <canvas id="chart"></canvas>
    <div id="statusList" class="mt-3 small"></div>
  </div>
</div>

<!-- LOGS -->
<div class="col-12 col-lg-4">
  <div class="card p-3">
    <h6 class="mb-3">📄 Logs</h6>

    <select id="logSelect" class="form-select mb-2"></select>

    <button class="btn btn-primary btn-sm mb-2" onclick="copyWhatsApp()">
      📲 WhatsApp bericht
    </button>

    <div id="liveLog" class="bg-black text-success p-2 rounded small" style="height:300px; overflow:auto;"></div>
  </div>
</div>

</div>

</div>

<!-- TOAST -->
<div id="toastContainer" class="position-fixed bottom-0 end-0 p-3"></div>

<script>
let chart
let currentSelected = null
let lastStatus = JSON.parse(localStorage.getItem("lastStatus") || "{}")

function showToast(message, type="info") {
  const map = {
    success: "toast-success",
    failed: "toast-error",
    running: "toast-running"
  }

  const toast = document.createElement("div")
  toast.className = `toast-modern ${map[type] || ""} mb-2`
  toast.innerHTML = message

  document.getElementById("toastContainer").appendChild(toast)
  setTimeout(() => toast.remove(), 4000)
}

async function loadStatus() {
  const res = await fetch("/api/status")
  const data = await res.json()

  let success = 0, failed = 0, running = 0
  let html = "", dropdown = ""

  data.forEach(r => {

    if (r.status === "success") success++
    if (r.status === "failed") failed++
    if (r.status === "running") running++

    if (!lastStatus[r.file]) {
      if (r.status === "running") showToast("🚀 Run gestart", "running")
      if (r.status === "success") showToast("✅ Run succesvol", "success")
      if (r.status === "failed") showToast("❌ Run gefaald", "failed")
    }

    lastStatus[r.file] = r.status

    html += `<div>${r.file} (${r.status})</div>`
    dropdown += `<option value="${r.file}">${r.file}</option>`
  })

  localStorage.setItem("lastStatus", JSON.stringify(lastStatus))

  document.getElementById("statusList").innerHTML = html

  const select = document.getElementById("logSelect")
  select.innerHTML = dropdown

  if (data.length > 0) {
    select.value = data[0].file
  }

  updateChart(success, failed, running)
}

function updateChart(success, failed, running) {
  if (!chart) {
    chart = new Chart(document.getElementById("chart"), {
      type: "doughnut",
      data: {
        labels: ["Success", "Failed", "Running"],
        datasets: [{
          data: [success, failed, running],
          backgroundColor: ["#28a745","#dc3545","#ffc107"]
        }]
      }
    })
  } else {
    chart.data.datasets[0].data = [success, failed, running]
    chart.update()
  }
}

async function loadLog() {
  const file = document.getElementById("logSelect").value
  if (!file) return

  const res = await fetch(`/api/log/${file}`)
  const data = await res.json()

  const el = document.getElementById("liveLog")
  el.innerHTML = data.lines.map(l => `<div>${l}</div>`).join("")
  el.scrollTop = el.scrollHeight
}

async function copyWhatsApp() {
  const file = document.getElementById("logSelect").value
  if (!file) return

  const res = await fetch(`/api/whatsapp/${file}`)
  const data = await res.json()

  navigator.clipboard.writeText(data.message)
  alert("WhatsApp bericht gekopieerd!")
}

setInterval(loadStatus, 3000)
setInterval(loadLog, 2000)
</script>

</body>
</html>
