<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f5f7fa, #e4ecf3);
}
.card {
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="container-fluid p-3">

<!-- HEADER -->
<div class="d-flex justify-content-between mb-3">
  <h5>🎾 Padel Bot</h5>
  <div>
    <a href="/run_now" class="btn btn-success btn-sm">Run</a>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
  </div>
</div>

<div class="row g-3">

<!-- CONFIG -->
<div class="col-lg-4">
<div class="card p-3">

<form id="configForm" method="POST" action="/update_config">

<input name="days_ahead" class="form-control mb-2" value="{{ config.days_ahead }}">
<input type="time" name="prep" class="form-control mb-2" value="{{ config.run_time.prep }}">
<input type="time" name="booking" class="form-control mb-2" value="{{ config.run_time.booking }}">

<button class="btn btn-dark w-100">Opslaan</button>

</form>

</div>
</div>

<!-- STATS -->
<div class="col-lg-4">
<div class="card p-3">
<canvas id="chart"></canvas>
<div id="statusList"></div>
</div>
</div>

<!-- LOGS -->
<div class="col-lg-4">
<div class="card p-3">
<select id="logSelect" class="form-select mb-2"></select>
<div id="liveLog" style="height:300px; overflow:auto;"></div>
</div>
</div>

<!-- CALENDAR -->
<div class="col-12">
<div class="card p-3">

<div class="d-flex justify-content-between mb-2">
<h6>📅 Kalender</h6>
<button onclick="fetchBookings()" class="btn btn-primary btn-sm">Sync</button>
</div>

<div id="calendar"></div>

</div>
</div>

</div>
</div>

<!-- BOOKING MODAL -->
<div class="modal fade" id="bookingModal">
<div class="modal-dialog">
<div class="modal-content p-3">
<h6 id="bookingTitle"></h6>
<div id="bookingPlayers"></div>
</div>
</div>
</div>

<!-- PLAYER MODAL -->
<div class="modal fade" id="playerModal">
<div class="modal-dialog">
<div class="modal-content p-3">

<h6 id="playerName"></h6>

📞 <input id="playerPhone" class="form-control mb-2">

<div id="playerRating"></div>
<div id="playerPunctuality"></div>

<button onclick="savePlayer()" class="btn btn-dark mt-2">Opslaan</button>

</div>
</div>
</div>

<script>
let chart
let calendar
let currentPlayerId=null

// ─────────────────────────
// STATUS + CHART (FIXED)
// ─────────────────────────
async function loadStatus(){
  const res = await fetch("/api/status")
  const data = await res.json()

  let success=0, failed=0, running=0
  let html="", dropdown=""

  data.forEach(r=>{
    if(r.status==="success") success++
    if(r.status==="failed") failed++
    if(r.status==="running") running++

    html+=`<div>${r.file} (${r.status})</div>`
    dropdown+=`<option value="${r.file}">${r.file}</option>`
  })

  document.getElementById("statusList").innerHTML=html
  document.getElementById("logSelect").innerHTML=dropdown

  updateChart(success,failed,running)
}

function updateChart(s,f,r){
  if(!chart){
    chart=new Chart(document.getElementById("chart"),{
      type:"doughnut",
      data:{
        labels:["Success","Failed","Running"],
        datasets:[{data:[s,f,r]}]
      }
    })
  }else{
    chart.data.datasets[0].data=[s,f,r]
    chart.update()
  }
}

// ─────────────────────────
// LOGS (FIXED)
// ─────────────────────────
async function loadLog(){
  const file=document.getElementById("logSelect").value
  if(!file) return

  const res=await fetch(`/api/log/${file}`)
  const data=await res.json()

  document.getElementById("liveLog").innerHTML=
    data.lines.map(l=>`<div>${l}</div>`).join("")
}

// ─────────────────────────
// CALENDAR (FIXED)
// ─────────────────────────
function formatISO(dateStr){
  const [d,m,yTime]=dateStr.split("-")
  const [y,time]=yTime.split(" ")
  return `${y}-${m}-${d}T${time}`
}

async function initCalendar(){
  const res=await fetch("/api/bookings")
  const bookings=await res.json()

  const events=bookings.map(b=>({
    title:b.court,
    start:formatISO(b.datetime),
    color:b.status==="confirmed"?"#28a745":"#ffc107",
    extendedProps:b
  }))

  if(calendar){
    calendar.removeAllEvents()
    calendar.addEventSource(events)
    return
  }

  calendar=new FullCalendar.Calendar(document.getElementById("calendar"),{
    initialView:"dayGridMonth",
    events,
    eventClick:function(info){
      openBookingModal(info.event.extendedProps)
    }
  })

  calendar.render()
}

// ─────────────────────────
// FETCH BOOKINGS
// ─────────────────────────
async function fetchBookings(){
  await fetch("/api/fetch_bookings")
  initCalendar()
}

// ─────────────────────────
// MODALS (FIXED)
// ─────────────────────────
function openBookingModal(b){

  document.getElementById("bookingTitle").innerText=b.datetime

  let html=""
  b.players.forEach(p=>{
    html+=`<div onclick="openPlayerModal('${p.id}')">${p.name}</div>`
  })

  document.getElementById("bookingPlayers").innerHTML=html

  new bootstrap.Modal(document.getElementById("bookingModal")).show()
}

async function openPlayerModal(id){
  currentPlayerId=id

  const res=await fetch("/api/players")
  const players=await res.json()
  const p=players[id]

  document.getElementById("playerName").innerText=p.name
  document.getElementById("playerPhone").value=p.phone||""

  renderRating(p.rating||3)
  renderPunctuality(p.punctuality||3)

  new bootstrap.Modal(document.getElementById("playerModal")).show()
}

// ─────────────────────────
// PLAYER SAVE (FIXED BUG)
// ─────────────────────────
function savePlayer(){
  fetch("/api/update_player",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id:currentPlayerId,
      phone:document.getElementById("playerPhone").value,
      rating:window.currentRating,
      punctuality:window.currentPunctuality
    })
  })
}

// ─────────────────────────
// RATING UI
// ─────────────────────────
function renderRating(val){
  window.currentRating=val
  let html=""
  for(let i=1;i<=5;i++){
    html+=`<span onclick="renderRating(${i})">${i<=val?"🎾":"⚪"}</span>`
  }
  document.getElementById("playerRating").innerHTML=html
}

function renderPunctuality(val){
  window.currentPunctuality=val
  let html=""
  for(let i=1;i<=5;i++){
    html+=`<span onclick="renderPunctuality(${i})">${i<=val?"⏰":"⚪"}</span>`
  }
  document.getElementById("playerPunctuality").innerHTML=html
}

// ─────────────────────────
// INIT (HERSTELD)
// ─────────────────────────
setInterval(()=>{
  loadStatus()
  loadLog()
},2000)

loadStatus()
initCalendar()
</script>

</body>
</html>
