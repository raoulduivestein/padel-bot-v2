<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container-fluid p-3">

<div class="d-flex justify-content-between mb-3">
  <h5>🎾 Padel Bot</h5>
  <div>
    <a href="/run_now" class="btn btn-success btn-sm">🚀 Run Now</a>
    <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
  </div>
</div>

<div class="row g-3">

<!-- CONFIG -->
<div class="col-12 col-lg-4">
  <div class="card shadow-sm">
    <div class="card-header">⚙️ Config</div>
    <div class="card-body">

      <form method="POST" action="/update_config">

        <input name="days_ahead" class="form-control mb-2" value="{{ config.days_ahead }}">
        <input name="prep" class="form-control mb-2" value="{{ config.run_time.prep }}">
        <input name="booking" class="form-control mb-3" value="{{ config.run_time.booking }}">

        <hr>

        {% for rule in config.booking_rules %}
        <div class="mb-2">
          <strong>{{ rule.day }}</strong>

          <input name="times_{{ loop.index0 }}"
                 class="form-control mb-1"
                 value="{{ rule.times | join(',') }}">

          <input name="duration_{{ loop.index0 }}"
                 class="form-control"
                 value="{{ rule.duration }}">
        </div>
        {% endfor %}

        <button class="btn btn-dark w-100">💾 Opslaan</button>

      </form>

    </div>
  </div>
</div>

<!-- STATUS -->
<div class="col-12 col-lg-4">
  <div class="card shadow-sm">
    <div class="card-header">📊 Status</div>
    <div class="card-body">

      <canvas id="chart"></canvas>

      <div id="statusList" class="mt-3 small"></div>

    </div>
  </div>
</div>

<!-- LIVE LOG -->
<div class="col-12 col-lg-4">
  <div class="card shadow-sm">
    <div class="card-header">🔄 Live Logs</div>
    <div class="card-body">

      <select id="logSelect" class="form-select mb-2"></select>

      <div id="liveLog"
           class="bg-black text-success p-2 rounded small"
           style="height:300px; overflow:auto;">
      </div>

    </div>
  </div>
</div>

</div>

</div>

<script>
let chart
let currentSelected = null

async function loadStatus() {
  const res = await fetch("/api/status")
  const data = await res.json()

  let success = 0
  let failed = 0

  let html = ""
  let dropdown = ""

  data.forEach((r, index) => {

    if (r.status === "success") success++
    if (r.status === "failed") failed++

    const color =
      r.status === "success" ? "green" :
      r.status === "failed" ? "red" : "gray"

    html += `
      <div style="cursor:pointer"
           onclick="openLog('${r.file}')">
        ${r.file}
        <span style="color:${color}">
          ● ${r.status}
        </span>
      </div>
    `

    dropdown += `
      <option value="${r.file}">
        ${r.file} (${r.status})
      </option>
    `
  })

  document.getElementById("statusList").innerHTML = html

  const select = document.getElementById("logSelect")
  const prev = select.value

  select.innerHTML = dropdown

  // 🔥 NIEUW: detecteer nieuwe run
  if (data.length > 0) {
    const newest = data[0].file

    // als huidige selectie niet bestaat of nieuwe run
    if (!prev || !data.find(d => d.file === prev)) {
      select.value = newest
      currentSelected = newest
    }

    // 🔥 als er een NIEUWE run is → auto selecteren
    if (currentSelected !== newest) {
      select.value = newest
      currentSelected = newest
    }
  }

  updateChart(success, failed)
}

function openLog(file) {
  window.location.href = "/log/" + file
}

function updateChart(success, failed) {
  const ctx = document.getElementById('chart')

  if (!chart) {
    chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Success','Failed'],
        datasets: [{ data:[success,failed] }]
      }
    })
  } else {
    chart.data.datasets[0].data = [success, failed]
    chart.update()
  }
}

async function loadLog() {
  const file = document.getElementById("logSelect").value
  if (!file) return

  const res = await fetch(`/api/log/${file}`)
  const data = await res.json()

  document.getElementById("liveLog").innerHTML =
    data.lines.map(l => `<div>${l}</div>`).join("")
}

// 🔄 refresh
setInterval(() => {
  loadStatus()
  loadLog()
}, 2000)

// initial load
loadStatus()
setTimeout(loadLog, 500)
</script>

</body>
</html>
